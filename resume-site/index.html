<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Mark Vetere resume page." />
  <title>Mark Vetere | Resume</title>
  <style>
    :root {
      --text: #ebf2fb;
      --muted: #b7c8da;
      --accent: #6bd3ff;
      --accent-strong: #2f8cff;
      --line: rgba(154, 188, 224, 0.2);
      --panel: rgba(10, 19, 33, 0.84);
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(47, 140, 255, 0.28), transparent 34%),
        radial-gradient(circle at top right, rgba(107, 211, 255, 0.18), transparent 28%),
        linear-gradient(160deg, #06101b 0%, #0d1728 48%, #121e31 100%);
    }

    .card {
      width: min(680px, 100%);
      padding: 40px 32px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .button:hover,
    .linkedin:hover {
      transform: translateY(-1px);
    }

    .button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #04111d;
    }

    .button.secondary {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .linkedin {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .linkedin:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 20px;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mark Vetere</h1>
    <div class="actions">
      <a class="button primary" href="./Mark-Vetere-Resume.pdf" target="_blank" rel="noopener noreferrer">View Resume</a>
      <a class="button secondary" href="./Mark-Vetere-Resume.pdf" download>Download Resume</a>
    </div>
    <a class="linkedin" href="https://www.linkedin.com/in/mark-vetere" target="_blank" rel="noopener noreferrer">
      linkedin.com/in/mark-vetere
    </a>
  </main>
</body>
</html>
